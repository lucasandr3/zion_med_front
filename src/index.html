  <!-- JSON-LD: Organization + WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://zionmed.com.br/#organization",

      },
      {
        "@type": "WebSite",
        "name": "ZionMed",
        "url": "https://zionmed.com.br/",
        "description": "Fichas e consentimentos digitais para clínicas — sem papel na recepção.",
        "publisher": { "@id": "https://zionmed.com.br/#organization" }
      }
    ]
  }
  </script>
</head>
<body class="theme-ocean-blue" style="background-color: var(--c-bg); color: var(--c-text)">
  <script>
    (function(){
      try {
        var theme = localStorage.getItem('zionmed_theme') || 'ocean-blue';
        Array.from(document.body.classList).filter(function(c){ return c.startsWith('theme-'); }).forEach(function(c){ document.body.classList.remove(c); });
        document.body.classList.add('theme-' + theme);
        if (localStorage.getItem('zionmed_dark_mode') === '1') document.body.classList.add('dark');
        if (localStorage.getItem('zionmed_sidebar_collapsed') === '1') document.body.classList.add('sidebar-collapsed');
      } catch(e) {}
    })();
  </script>
  <app-root></app-root>
</body>
</html>
