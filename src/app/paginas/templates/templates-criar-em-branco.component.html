<div class="relative min-h-[200px]">
  @if (erro) {
    <p class="text-sm mb-4" style="color: var(--c-error, #dc2626)">{{ erro }}</p>
  }

  <div class="card">
    <form (ngSubmit)="salvar()" class="flex flex-col gap-5">
      <div>
        <label class="form-label">Nome</label>
        <input type="text" [(ngModel)]="name" name="name" required class="form-input" placeholder="Ex: Ficha de Anamnese" />
      </div>
      <div>
        <label class="form-label">Descrição</label>
        <textarea [(ngModel)]="description" name="description" rows="3" class="form-input" placeholder="Breve descrição do modelo..."></textarea>
      </div>
      <div>
        <label class="form-label">Categoria</label>
        <zm-searchable-select
          [options]="opcoesCategoria"
          [value]="categoriaSelecionada"
          placeholder="Sem categoria"
          searchPlaceholder="Buscar categoria..."
          createActionLabel="Nova categoria"
          (valueChange)="selecionarCategoria($event)"
          (createAction)="abrirCriacaoCategoria()"
        ></zm-searchable-select>
      </div>
      @if (categoriaSelecionada === '__nova__') {
        <div>
          <label class="form-label">Nova categoria</label>
          <input
            type="text"
            [(ngModel)]="novaCategoria"
            name="novaCategoria"
            class="form-input"
            placeholder="Ex: Anamnese, Acompanhamento, Evolução..."
          />
        </div>
      }
      <div class="flex items-center gap-6">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" [(ngModel)]="is_active" name="is_active" class="form-checkbox" />
          <span class="form-label mb-0">Ativo</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" [(ngModel)]="public_enabled" name="public_enabled" class="form-checkbox" />
          <span class="form-label mb-0">Formulário público</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="checkbox"
            [(ngModel)]="public_require_person_link"
            name="public_require_person_link"
            class="form-checkbox"
          />
          <span class="form-label mb-0">Exigir identificação antes do formulário</span>
        </label>
      </div>
      <div class="flex items-center gap-3 pt-2">
        <button type="submit" class="btn-primary" [disabled]="salvando || !name.trim() || (categoriaSelecionada === '__nova__' && !novaCategoria.trim())">
          @if (salvando) {
            <span class="btn-spinner" aria-hidden="true"></span>
            Criando…
          } @else {
            <span class="material-symbols-outlined text-base">save</span>
            Criar modelo
          }
        </button>
        <a routerLink="/templates" class="text-sm no-underline" style="color: var(--c-muted)" title="Voltar para modelos">Cancelar</a>
      </div>
    </form>
  </div>
</div>
