<div class="relative min-h-[200px]">
  <div class="page-header mb-5">
    <div class="page-title">
      <div class="page-title-icon">
        <span class="material-symbols-outlined">edit_note</span>
      </div>
      <div>
        <h1>Editar template</h1>
      </div>
    </div>
  </div>

  @if (showSkeleton()) {
    <zm-skeleton-card [height]="280" />
  } @else if (!listaPronta) {
  } @else if (erro) {
    <p class="text-sm mb-4" style="color: var(--c-error, #dc2626)">{{ erro }}</p>
  } @else if (template) {
    <div class="zm-content-enter">
    <div class="card">
      <form (ngSubmit)="salvar()" class="flex flex-col gap-5">
        <div>
          <label class="form-label">Nome</label>
          <input type="text" [(ngModel)]="name" name="name" required class="form-input" />
        </div>
        <div>
          <label class="form-label">Descrição</label>
          <textarea [(ngModel)]="description" name="description" rows="3" class="form-input"></textarea>
        </div>
        <div class="flex items-center gap-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" [(ngModel)]="is_active" name="is_active" class="form-checkbox" />
            <span class="form-label mb-0">Ativo</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" [(ngModel)]="public_enabled" name="public_enabled" class="form-checkbox" />
            <span class="form-label mb-0">Formulário público</span>
          </label>
        </div>
        <div class="flex items-center gap-3 pt-2">
          <button type="submit" class="btn-primary" [disabled]="salvando || !name.trim()">
            @if (salvando) {
              <span class="btn-spinner" aria-hidden="true"></span>
              Salvando…
            } @else {
              <span class="material-symbols-outlined text-base">save</span>
              Salvar alterações
            }
          </button>
          <a routerLink="/templates" class="text-sm no-underline" style="color: var(--c-muted)" title="Voltar para Templates">Cancelar</a>
        </div>
      </form>
    </div>
    </div>
  }
</div>
