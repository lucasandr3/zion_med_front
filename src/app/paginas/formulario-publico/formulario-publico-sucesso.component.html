<div class="sucesso-page" [class.dark]="dark">
  <div class="sucesso-inner max-w-md mx-auto px-4">
    <div class="sucesso-card" style="border-width: 1px">
      <div class="success-icon-wrap" aria-hidden="true">
        <svg class="w-9 h-9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <h1 class="sucesso-title">Ficha enviada!</h1>
      @if (clinicName) {
        <div class="flex items-center justify-center gap-2 mb-3">
          <div class="logo-wrap shrink-0" [class.logo-wrap--img]="!!clinicLogoUrl">
            @if (clinicLogoUrl) {
              <img
                [src]="clinicLogoUrl"
                [alt]="clinicName ? 'Logo ' + clinicName : 'Logo da clínica'"
                loading="lazy"
              />
            } @else {
              <span class="logo-initial">{{ clinicName.charAt(0) | uppercase }}</span>
            }
          </div>
          <p class="bio-text font-semibold text-sm">{{ clinicName }}</p>
        </div>
        <p class="bio-muted text-sm mb-5 leading-relaxed">Recebemos seu formulário. Obrigado!</p>
      } @else {
        <p class="bio-muted text-sm mb-5 leading-relaxed">Seu protocolo foi registrado com sucesso.</p>
      }
      @if (protocolNumber) {
        <div class="protocol-box bio-bg-soft bio-border rounded-xl py-4 px-5" style="border-width: 1px">
          <p class="text-xs bio-muted uppercase tracking-wider mb-1 font-semibold">Protocolo</p>
          <p class="text-xl font-mono font-semibold bio-text">{{ protocolNumber }}</p>
        </div>
      }
    </div>
  </div>
</div>
