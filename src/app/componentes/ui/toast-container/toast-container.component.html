<div class="toast-host" aria-live="polite" aria-relevant="additions removals">
  @for (t of toasts(); track t.id) {
    <div
      class="toast"
      [class.toast-success]="t.type === 'success'"
      [class.toast-error]="t.type === 'error'"
      [class.toast-warning]="t.type === 'warning'"
      [class.toast-info]="t.type === 'info'"
      role="status"
    >
      <div class="toast-icon" aria-hidden="true">
        <span class="material-symbols-outlined">{{ icon(t.type) }}</span>
      </div>
      <div class="toast-body">
        <div class="toast-title">{{ t.title }}</div>
        @if (t.desc) {
          <div class="toast-desc">{{ t.desc }}</div>
        }
      </div>
      <button type="button" class="toast-close" (click)="dismiss(t.id)" aria-label="Fechar notificação">
        <span class="material-symbols-outlined">close</span>
      </button>
      <div
        class="toast-progress"
        [style.animation-duration]="t.duration + 'ms'"
      ></div>
    </div>
  }
</div>
