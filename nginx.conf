# Raiz do app no subdomínio de produção não deve exibir a landing (mesma SPA).
map $host $app_skip_landing {
  default 0;
  app.gestgo.com.br 1;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    if ($app_skip_landing = 1) {
      return 302 /autenticacao;
    }
    try_files $uri /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
