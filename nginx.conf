# Raiz no host do app → login (evita landing). Proxies variam nos headers.
map $host $host_is_app {
  default 0;
  ~*^app\.gestgo\.com\.br(:\d+)?$ 1;
}

map $http_host $http_host_is_app {
  default 0;
  ~*^app\.gestgo\.com\.br(:\d+)?$ 1;
}

map $http_x_forwarded_host $xff_is_app {
  default 0;
  ~*^app\.gestgo\.com\.br 1;
}

map $http_x_original_host $xorig_is_app {
  default 0;
  ~*^app\.gestgo\.com\.br 1;
}

map $http_cf_connecting_host $cf_is_app {
  default 0;
  ~*^app\.gestgo\.com\.br 1;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    set $app_root_redirect "${host_is_app}${http_host_is_app}${xff_is_app}${xorig_is_app}${cf_is_app}";
    if ($app_root_redirect ~ "1") {
      return 302 /autenticacao;
    }
    try_files $uri /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
